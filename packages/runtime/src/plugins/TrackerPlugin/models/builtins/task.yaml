type: task
displayName: Task
displayNamePlural: Tasks
icon: task_alt
color: "#10b981"

modes:
  inline: true
  fullDocument: false

idPrefix: tsk

fields:
  - name: title
    type: string
    required: true

  - name: status
    type: select
    default: to-do
    options:
      - value: to-do
        label: To Do
        icon: circle
      - value: in-progress
        label: In Progress
        icon: motion_photos_on
      - value: done
        label: Done
        icon: check_circle

  - name: priority
    type: select
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
      - value: critical
        label: Critical

  - name: owner
    type: string

  - name: dueDate
    type: date

inlineTemplate: "{icon} {title} {status} {priority}"
