# Git command checks
# Patterns for detecting dangerous or significant git operations

# Destructive operations
- id: git:reset-hard
  pattern: 'git\s+reset\s+--hard'
  description: "Hard reset will permanently discard uncommitted changes"
  severity: destructive
  category: git

- id: git:force-push
  pattern: 'git\s+push\s+(-f|--force|--force-with-lease)'
  description: "Force push will overwrite remote history"
  severity: destructive
  category: git

- id: git:clean-force
  pattern: 'git\s+clean\s+(-f|-fd|-fx)'
  description: "Will remove all untracked files and directories"
  severity: destructive
  category: git

- id: git:branch-force-delete
  pattern: 'git\s+branch\s+(-D|--delete\s+--force)'
  description: "Force delete a branch even if not fully merged"
  severity: destructive
  category: git

- id: git:checkout-force
  pattern: 'git\s+checkout\s+(-f|--force)'
  description: "Force checkout will discard local changes"
  severity: destructive
  category: git

- id: git:filter-branch
  pattern: 'git\s+filter-branch'
  description: "Rewrite git history - can be dangerous if used incorrectly"
  severity: destructive
  category: git

- id: git:gc-prune
  pattern: 'git\s+gc\s+--prune=now'
  description: "Permanently delete unreachable objects"
  severity: destructive
  category: git

- id: git:update-ref-delete
  pattern: 'git\s+update-ref\s+-d'
  description: "Delete a git reference"
  severity: destructive
  category: git

- id: git:reflog-expire
  pattern: 'git\s+reflog\s+expire\s+--expire=now'
  description: "Expire reflog entries immediately"
  severity: destructive
  category: git

# Potentially risky operations (ask by default)
- id: git:rebase
  pattern: 'git\s+rebase'
  description: "Rebase rewrites commit history"
  severity: risky
  category: git

- id: git:rebase-interactive
  pattern: 'git\s+rebase\s+-i'
  description: "Interactive rebase can modify commit history"
  severity: risky
  category: git

- id: git:cherry-pick
  pattern: 'git\s+cherry-pick'
  description: "Apply changes from existing commits to current branch"
  severity: risky
  category: git

- id: git:merge-abort
  pattern: 'git\s+merge\s+--abort'
  description: "Abort an ongoing merge"
  severity: risky
  category: git

- id: git:stash-drop
  pattern: 'git\s+stash\s+drop'
  description: "Delete a stash entry"
  severity: risky
  category: git

- id: git:stash-clear
  pattern: 'git\s+stash\s+clear'
  description: "Delete all stash entries"
  severity: destructive
  category: git

- id: git:tag-delete
  pattern: 'git\s+tag\s+-d'
  description: "Delete a tag"
  severity: risky
  category: git

- id: git:branch-delete
  pattern: 'git\s+branch\s+-d'
  description: "Delete a branch"
  severity: risky
  category: git

- id: git:remote-remove
  pattern: 'git\s+remote\s+(remove|rm)'
  description: "Remove a remote"
  severity: risky
  category: git

# Network operations (significant but not destructive)
- id: git:push
  pattern: 'git\s+push(?!\s+(-f|--force))'
  description: "Push commits to remote repository"
  severity: significant
  category: git

- id: git:pull
  pattern: 'git\s+pull'
  description: "Pull and merge changes from remote"
  severity: significant
  category: git

- id: git:fetch
  pattern: 'git\s+fetch'
  description: "Fetch changes from remote"
  severity: safe
  category: git

# Write operations
- id: git:commit
  pattern: 'git\s+commit'
  description: "Create a new commit"
  severity: significant
  category: git

- id: git:add
  pattern: 'git\s+add'
  description: "Stage changes for commit"
  severity: safe
  category: git

- id: git:reset-soft
  pattern: 'git\s+reset\s+--soft'
  description: "Soft reset - keeps changes staged"
  severity: significant
  category: git

- id: git:reset-mixed
  pattern: 'git\s+reset(?!\s+--(hard|soft))'
  description: "Mixed reset - unstages changes but keeps them"
  severity: significant
  category: git
