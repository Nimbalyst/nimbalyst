# Filesystem command checks
# Patterns for detecting dangerous file operations

# Highly destructive operations
- id: fs:rm-rf-root
  pattern: 'rm\s+(-rf|-fr|-r\s+-f|-f\s+-r)\s+/'
  description: "Recursive forced delete from root - extremely dangerous"
  severity: destructive
  category: filesystem

- id: fs:rm-rf
  pattern: 'rm\s+(-rf|-fr|-r\s+-f|-f\s+-r)'
  description: "Recursive forced delete"
  severity: destructive
  category: filesystem

- id: fs:rm-recursive
  pattern: 'rm\s+(-r|-R|--recursive)'
  description: "Recursive delete"
  severity: destructive
  category: filesystem

- id: fs:rm
  pattern: 'rm\s+'
  description: "Delete files"
  severity: risky
  category: filesystem

- id: fs:rmdir
  pattern: 'rmdir\s+'
  description: "Remove directory"
  severity: risky
  category: filesystem

# Dangerous redirects
- id: fs:dev-null-move
  pattern: 'mv\s+.*\s+/dev/null'
  description: "Moving files to /dev/null destroys them"
  severity: destructive
  category: filesystem

- id: fs:truncate-file
  pattern: '>\s*[^|&;]+'
  description: "Truncate/overwrite file"
  severity: risky
  category: filesystem

# Disk operations
- id: fs:dd
  pattern: 'dd\s+'
  description: "Direct disk write - can destroy data"
  severity: destructive
  category: filesystem

- id: fs:mkfs
  pattern: 'mkfs'
  description: "Format filesystem - destroys all data"
  severity: destructive
  category: filesystem

- id: fs:fdisk
  pattern: 'fdisk\s+'
  description: "Partition table modification"
  severity: destructive
  category: filesystem

- id: fs:parted
  pattern: 'parted\s+'
  description: "Partition manipulation"
  severity: destructive
  category: filesystem

# Permission changes
- id: fs:chmod-recursive-root
  pattern: 'chmod\s+(-R|--recursive)\s+.*\s+/'
  description: "Recursive permission change from root"
  severity: destructive
  category: filesystem

- id: fs:chmod-recursive
  pattern: 'chmod\s+(-R|--recursive)'
  description: "Recursive permission change"
  severity: risky
  category: filesystem

- id: fs:chown-recursive
  pattern: 'chown\s+(-R|--recursive)'
  description: "Recursive ownership change"
  severity: risky
  category: filesystem

# Find with delete
- id: fs:find-delete
  pattern: 'find\s+.*-delete'
  description: "Find and delete files"
  severity: destructive
  category: filesystem

- id: fs:find-exec-rm
  pattern: 'find\s+.*-exec\s+rm'
  description: "Find and remove files"
  severity: destructive
  category: filesystem

# Move/copy (can overwrite)
- id: fs:mv
  pattern: 'mv\s+'
  description: "Move/rename files (can overwrite)"
  severity: risky
  category: filesystem

- id: fs:cp-force
  pattern: 'cp\s+(-f|--force)'
  description: "Force copy (overwrites without prompt)"
  severity: risky
  category: filesystem

# Dangerous commands
- id: fs:shred
  pattern: 'shred\s+'
  description: "Securely delete files (unrecoverable)"
  severity: destructive
  category: filesystem

- id: fs:wipe
  pattern: 'wipe\s+'
  description: "Securely wipe files"
  severity: destructive
  category: filesystem
