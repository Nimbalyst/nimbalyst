<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--mockup-bg-secondary, #1a1a1a);
      color: var(--mockup-text, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--mockup-bg, #2d2d2d);
      border: 1px solid var(--mockup-border, #4a4a4a);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .logo span { color: var(--mockup-primary, #60a5fa); }
    .subtitle {
      font-size: 14px;
      color: var(--mockup-text-muted, #b3b3b3);
      margin-bottom: 32px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--mockup-text-muted, #b3b3b3);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      background: var(--mockup-bg-secondary, #1a1a1a);
      border: 1px solid var(--mockup-border, #4a4a4a);
      border-radius: 8px;
      color: var(--mockup-text, #ffffff);
      font-size: 14px;
      outline: none;
    }
    .field input:focus {
      border-color: var(--mockup-primary, #60a5fa);
    }
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .options label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--mockup-text-muted, #b3b3b3);
      cursor: pointer;
    }
    .options a {
      color: var(--mockup-primary, #60a5fa);
      text-decoration: none;
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--mockup-primary, #60a5fa);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      font-size: 12px;
      color: var(--mockup-text-faint, #808080);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--mockup-border, #4a4a4a);
    }
    .btn-social {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--mockup-border, #4a4a4a);
      border-radius: 8px;
      color: var(--mockup-text, #ffffff);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-social:hover { background: var(--mockup-bg-tertiary, #3a3a3a); }
    .error-msg {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--mockup-text-muted, #b3b3b3);
    }
    .footer a {
      color: var(--mockup-primary, #60a5fa);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Acme<span>Hub</span></div>
    <div class="subtitle">Sign in to your workspace</div>

    <div class="error-msg" id="error"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@company.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <div class="options">
      <label><input type="checkbox" /> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-primary" id="signin">Sign In</button>

    <div class="divider">or continue with</div>

    <button class="btn-social">Continue with Google</button>
    <button class="btn-social">Continue with GitHub</button>

    <div class="footer">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('signin');
    const error = document.getElementById('error');
    const email = document.getElementById('email');
    const password = document.getElementById('password');

    // Live validation - clear error when typing
    email.addEventListener('input', () => { error.style.display = 'none'; });
    password.addEventListener('input', () => { error.style.display = 'none'; });

    // Email format check
    function isValidEmail(str) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
    }

    btn.addEventListener('click', () => {
      if (!email.value || !password.value) {
        error.textContent = 'Please fill in all fields';
        error.style.display = 'block';
      } else if (!isValidEmail(email.value)) {
        error.textContent = 'Please enter a valid email address';
        error.style.display = 'block';
      } else if (password.value.length < 6) {
        error.textContent = 'Password must be at least 6 characters';
        error.style.display = 'block';
      } else {
        error.style.display = 'none';
        btn.textContent = 'Signing in...';
        btn.style.opacity = '0.6';
        btn.disabled = true;
        // Simulate auth delay then success
        setTimeout(() => {
          btn.textContent = 'Redirecting...';
          btn.style.background = '#4ade80';
        }, 1500);
      }
    });

    // Enter key submits
    password.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });

    // Social buttons feedback
    document.querySelectorAll('.btn-social').forEach(b => {
      b.addEventListener('click', function() {
        this.style.borderColor = 'var(--mockup-primary, #60a5fa)';
        this.textContent = 'Redirecting to ' + this.textContent.replace('Continue with ', '') + '...';
        this.style.opacity = '0.6';
        this.disabled = true;
      });
    });

    // Forgot password link
    document.querySelector('.options a').addEventListener('click', (e) => {
      e.preventDefault();
      error.textContent = 'Password reset link sent to your email';
      error.style.display = 'block';
      error.style.background = 'rgba(74,222,128,0.15)';
      error.style.color = '#4ade80';
    });
  </script>
</body>
</html>
