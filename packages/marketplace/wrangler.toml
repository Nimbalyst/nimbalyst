name = "nimbalyst-marketplace"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[dev]
port = 8791

# R2 bucket for extension packages, screenshots, and registry
[[r2_buckets]]
binding = "EXTENSIONS_BUCKET"
bucket_name = "nimbalyst-extensions"

# KV namespace for download counts
[[kv_namespaces]]
binding = "DOWNLOAD_COUNTS"
id = "placeholder-create-via-wrangler"

# Build-time version injection (set by deploy script)
[vars]
VERSION = "dev"
CDN_BASE_URL = "http://localhost:8791"

# --- Environments ---

[env.staging]
name = "nimbalyst-marketplace-staging"

[[env.staging.r2_buckets]]
binding = "EXTENSIONS_BUCKET"
bucket_name = "nimbalyst-extensions-staging"

[[env.staging.kv_namespaces]]
binding = "DOWNLOAD_COUNTS"
id = "placeholder-staging"

[env.staging.vars]
VERSION = "staging"
CDN_BASE_URL = "https://cdn-staging.extensions.nimbalyst.com"

[env.production]
name = "nimbalyst-marketplace"
routes = [
  { pattern = "extensions.nimbalyst.com", custom_domain = true }
]

[observability]
enabled = true
head_sampling_rate = 1

[[env.production.r2_buckets]]
binding = "EXTENSIONS_BUCKET"
bucket_name = "nimbalyst-extensions"

[[env.production.kv_namespaces]]
binding = "DOWNLOAD_COUNTS"
id = "placeholder-production"

[env.production.vars]
VERSION = "0.1.0"
CDN_BASE_URL = "https://cdn.extensions.nimbalyst.com"
