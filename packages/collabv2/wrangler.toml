name = "nimbalyst-yjssync"
main = "dist/worker.js"
compatibility_date = "2024-11-01"

# Development environment
[env.dev]
workers_dev = true

# Production environment
[env.production]
workers_dev = false
routes = [
  { pattern = "sync.nimbalyst.com/*", zone_name = "nimbalyst.com" }
]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "nimbalyst-yjssync"
database_id = "TBD" # Created with: wrangler d1 create nimbalyst-yjssync

# Durable Objects binding
[[durable_objects.bindings]]
name = "YJSSYNC"
class_name = "YjsSyncObject"
script_name = "nimbalyst-yjssync"

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_classes = ["YjsSyncObject"]
