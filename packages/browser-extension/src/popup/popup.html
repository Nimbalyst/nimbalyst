<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimbalyst Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1>Nimbalyst Web Clipper</h1>
    </div>

    <div class="popup-content">
      <div class="status-message" id="statusMessage"></div>

      <div class="action-buttons">
        <button id="clipPageBtn" class="btn btn-primary">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
          </svg>
          <span>Clip Page</span>
        </button>

        <button id="clipSelectionBtn" class="btn btn-secondary" disabled>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
          </svg>
          <span>Clip Selection</span>
        </button>

        <button id="clipWithAIBtn" class="btn btn-accent">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
          </svg>
          <span>Extract with AI</span>
        </button>
      </div>

      <div class="ai-prompt-container hidden" id="aiPromptContainer">
        <label for="aiPromptInput">What would you like to extract?</label>
        <textarea
          id="aiPromptInput"
          placeholder="Example: Extract all product names and prices into a table"
          rows="3"
        ></textarea>
        <div class="ai-prompt-actions">
          <button id="cancelAIBtn" class="btn btn-small btn-secondary">Cancel</button>
          <button id="submitAIBtn" class="btn btn-small btn-primary">Extract</button>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      <div class="page-info" id="pageInfo">
        <span class="page-title" id="pageTitle">Loading...</span>
      </div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
