# CollabV3 - PartyKit-based sync server
name = "nimbalyst-collabv3"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Development
[dev]
port = 8790

# Durable Objects
[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoom"

[[durable_objects.bindings]]
name = "INDEX_ROOM"
class_name = "IndexRoom"

# DO migrations - enable SQLite storage
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom", "IndexRoom"]

# D1 Database (for global user index only)
[[d1_databases]]
binding = "DB"
database_name = "nimbalyst-collabv3"
database_id = "c3b3979d-e20c-4547-a103-91c1a0b32388"

# KV for rate limiting and feature flags (optional)
# [[kv_namespaces]]
# binding = "KV"
# id = "placeholder"

# R2 for attachments (optional, future)
# [[r2_buckets]]
# binding = "ATTACHMENTS"
# bucket_name = "nimbalyst-attachments"

# Observability - enables logs, traces, and metrics in Cloudflare dashboard
[observability]
enabled = true
head_sampling_rate = 1  # Sample 100% of requests

# Environment variables
[vars]
ENVIRONMENT = "development"

# Staging environment
[env.staging]
name = "nimbalyst-collabv3-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# Production environment
[env.production]
name = "nimbalyst-collabv3"
routes = [
  { pattern = "sync.nimbalyst.com", custom_domain = true }
]

# Production Durable Objects
[[env.production.durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoom"

[[env.production.durable_objects.bindings]]
name = "INDEX_ROOM"
class_name = "IndexRoom"

# Production D1 Database
[[env.production.d1_databases]]
binding = "DB"
database_name = "nimbalyst-collabv3"
database_id = "c3b3979d-e20c-4547-a103-91c1a0b32388"

# Production migrations
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom", "IndexRoom"]

[env.production.vars]
ENVIRONMENT = "production"
STYTCH_PROJECT_ID = "project-live-bc85edd6-90a8-43a0-b9e3-1315bbed6650"
ALLOWED_ORIGINS = "https://app.nimbalyst.com,https://nimbalyst.com,capacitor://localhost"
