<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbalyst</title>
    <script>
        // Determine theme FIRST, before any CSS - using SYNC API to prevent flash
        (function() {
            // Get theme SYNCHRONOUSLY from main process - this is the KEY to no flash
            let theme = 'auto';
            try {
                if (window.electronAPI && window.electronAPI.getThemeSync) {
                    theme = window.electronAPI.getThemeSync();
                } else {
                    theme = localStorage.getItem('theme') || 'auto';
                }
            } catch (e) {
                console.error('[THEME] Error getting theme:', e);
                theme = localStorage.getItem('theme') || 'auto';
            }

            // Normalize 'system' to 'auto'
            if (theme === 'system') {
                theme = 'auto';
            }

            const root = document.documentElement;
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (theme === 'dark') {
                root.classList.add('dark-theme');
                root.setAttribute('data-theme', 'dark');
            } else if (theme === 'light') {
                root.classList.add('light-theme');
                root.setAttribute('data-theme', 'light');
            } else if (theme === 'crystal-dark') {
                root.classList.add('crystal-dark-theme');
                root.setAttribute('data-theme', 'crystal-dark');
            } else {
                // Auto theme - apply system preference immediately to prevent flash
                if (prefersDark) {
                    root.classList.add('dark-theme');
                    root.setAttribute('data-theme', 'dark');
                } else {
                    root.classList.add('light-theme');
                    root.setAttribute('data-theme', 'light');
                }
            }
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
