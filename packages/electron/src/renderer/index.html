<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbalyst</title>

    <!-- es-module-shims: enables dynamic import maps for extension loading -->
    <!-- Must be loaded before any module scripts. Provides importShim() and importShim.addImportMap() -->
    <!-- shimMode enables addImportMap() for dynamic import map registration -->
    <script>window.esmsInitOptions = { shimMode: true };</script>
    <script async src="./es-module-shims.js"></script>

    <script>
        // Determine theme FIRST, before any CSS - using SYNC API to prevent flash
        // IMPORTANT: getThemeSync() resolves 'system' to actual theme, so we get 'light' or 'dark' directly
        (function() {
            // Diagnostic logging for theme initialization issues
            const hasElectronAPI = !!window.electronAPI;
            const hasGetThemeSync = !!(window.electronAPI?.getThemeSync);
            console.log('[THEME-INIT] Diagnostic:', {
                hasElectronAPI,
                hasGetThemeSync,
                platform: navigator.platform,
                userAgent: navigator.userAgent
            });

            // Get theme SYNCHRONOUSLY from main process - already resolved!
            let theme;
            try {
                theme = window.electronAPI?.getThemeSync?.() || 'light';
            } catch (err) {
                console.error('[THEME-INIT] Error calling getThemeSync:', err);
                theme = 'light';
            }

            console.log('[THEME-INIT] Resolved theme from main process:', theme);

            const root = document.documentElement;

            // Apply theme directly - no need to check prefers-color-scheme
            // because getThemeSync() already did that for us
            if (theme === 'dark') {
                root.classList.add('dark-theme');
                root.setAttribute('data-theme', 'dark');
            } else if (theme === 'light') {
                root.classList.add('light-theme');
                root.setAttribute('data-theme', 'light');
            } else if (theme === 'crystal-dark') {
                root.classList.add('crystal-dark-theme');
                root.setAttribute('data-theme', 'crystal-dark');
            } else {
                // Fallback to light (shouldn't happen)
                console.warn('[THEME-INIT] Unexpected theme:', theme, 'falling back to light');
                root.classList.add('light-theme');
                root.setAttribute('data-theme', 'light');
            }

            console.log('[THEME-INIT] Applied class:', theme + '-theme', 'to document.documentElement');
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
