name: Bug report
description: Something isn't working in Nimbalyst
title: "[Bug]: "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can reproduce and fix it.
        For usage questions, please use [Discussions → Q&A](https://github.com/Nimbalyst/nimbalyst/discussions/categories/q-a) instead.
  - type: textarea
    id: problem
    attributes:
      label: What happened, and what did you expect to happen?
      description: Describe the bug and what you expected instead.
      placeholder: |
        What happened:
        The app crashed when I ...

        What I expected:
        I expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nimbalyst version
      placeholder: e.g. 0.58.3
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      description: Paste relevant logs or attach screenshots.
