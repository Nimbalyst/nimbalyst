name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build rexical package
        working-directory: packages/rexical
        run: npm run build

      # macOS specific setup
      - name: Import macOS certificates
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(openssl rand -base64 32)}"
          
          # Decode certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Import certificate
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Clean up
          rm certificate.p12

      # Windows specific setup (optional - only if certificate is provided)
      - name: Import Windows certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          # Decode certificate
          [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -Path certificate.pfx -Encoding Byte
          
          # Import to certificate store
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PWD -Force -AsPlainText
          Import-PfxCertificate -FilePath certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          
          # Clean up
          Remove-Item certificate.pfx
        shell: powershell

      # Build Electron app
      - name: Build Electron app
        env:
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: '3GYP4YJ3DH'
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # Windows signing
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
          # Don't publish during build - we'll handle it separately
          # GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Require notarization for release builds
          REQUIRE_NOTARIZE: ${{ github.event_name == 'push' || github.event.inputs.release == 'true' }}
        working-directory: packages/electron
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event.inputs.release }}" == "true" ]; then
              npm run build:mac:notarized -- --publish never
            else
              npm run build:mac:local -- --publish never
            fi
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            npm run build:win -- --publish never
          else
            npm run build:linux -- --publish never
          fi
        shell: bash

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/electron/release/*.dmg
            packages/electron/release/*.exe
            packages/electron/release/*.AppImage
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.release == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            # Use the package.json version for non-tag builds
            PACKAGE_VERSION=$(node -p "require('./packages/electron/package.json').version")
            VERSION="${PACKAGE_VERSION}-dev.${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release-files/*
          generate_release_notes: false
          body: |
            ## What's Changed
            See [commit history](https://github.com/stravu/preditor/commits/main) for details.
            
            ## Downloads
            - **macOS**: Download the .dmg file
            - **Windows**: Download the .exe file  
            - **Linux**: Download the .AppImage file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to public repository
      - name: Publish to Public Repository
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          # Check if PAT is configured
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLIC_REPO_PAT secret not configured. Skipping public release."
            echo "To enable public releases, create a PAT with 'repo' scope and add it as PUBLIC_REPO_PAT secret."
            exit 0
          fi
          
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          # Check if release already exists in public repo
          if gh release view "$VERSION" --repo stravu/preditor-releases &>/dev/null; then
            echo "Release $VERSION already exists in public repository"
            exit 0
          fi
          
          # Find and rename files for clarity
          cd release-files
          
          # Rename files to be more descriptive and track what's available
          RELEASE_FILES=""
          RELEASE_NOTES="Download Preditor Editor for your operating system:"
          RELEASE_NOTES="${RELEASE_NOTES}\n\n### Available Downloads"
          
          for file in *.dmg; do
            if [ -f "$file" ]; then
              mv "$file" "Preditor-macOS-${VERSION}.dmg"
              RELEASE_FILES="${RELEASE_FILES} release-files/Preditor-macOS-${VERSION}.dmg"
              RELEASE_NOTES="${RELEASE_NOTES}\n- **macOS**: Preditor-macOS-${VERSION}.dmg"
            fi
          done
          
          for file in *.exe; do
            if [ -f "$file" ]; then
              mv "$file" "Preditor-Windows-${VERSION}.exe"
              RELEASE_FILES="${RELEASE_FILES} release-files/Preditor-Windows-${VERSION}.exe"
              RELEASE_NOTES="${RELEASE_NOTES}\n- **Windows**: Preditor-Windows-${VERSION}.exe"
            fi
          done
          
          for file in *.AppImage; do
            if [ -f "$file" ]; then
              mv "$file" "Preditor-Linux-${VERSION}.AppImage"
              RELEASE_FILES="${RELEASE_FILES} release-files/Preditor-Linux-${VERSION}.AppImage"
              RELEASE_NOTES="${RELEASE_NOTES}\n- **Linux**: Preditor-Linux-${VERSION}.AppImage"
            fi
          done
          
          cd ..
          
          # Add installation instructions
          RELEASE_NOTES="${RELEASE_NOTES}\n\n### Installation"
          RELEASE_NOTES="${RELEASE_NOTES}\n- **macOS**: Open the .dmg file and drag Preditor to Applications"
          RELEASE_NOTES="${RELEASE_NOTES}\n- **Windows**: Run the .exe installer (may show security warning - unsigned)"
          RELEASE_NOTES="${RELEASE_NOTES}\n- **Linux**: Make the AppImage executable and run it"
          RELEASE_NOTES="${RELEASE_NOTES}\n\nThe app will automatically check for updates."
          
          # Create release in public repository with available files
          echo -e "$RELEASE_NOTES" | gh release create "$VERSION" \
            --repo stravu/preditor-releases \
            --title "Preditor $VERSION" \
            --notes-file - \
            $RELEASE_FILES