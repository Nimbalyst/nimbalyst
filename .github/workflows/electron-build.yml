name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      create_github_release:
        description: 'Create GitHub Release (for public promotion)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  workflow_call:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: false
        type: boolean
      create_github_release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Both macOS builds run on arm64 runner (cheaper than Intel)
          # electron-builder can cross-compile x64 on arm64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          # Windows ARM64 build is temporarily disabled while we work through
          # winCodeSign / DigiCert tooling gaps on native ARM64 runners.

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Upgrade npm to 10.x
        run: npm install -g npm@10

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "win" ] && [ "${{ matrix.arch }}" == "arm64" ]; then
            # workerd (transitive via wrangler, used only by collabv3 and
            # marketplace Cloudflare Workers packages) has no Windows ARM64
            # prebuild and its postinstall throws "Unsupported platform".
            # The Electron build doesn't need workerd, so install with
            # --ignore-scripts and then re-run only the Electron workspace's
            # postinstall (electron-builder install-app-deps -> rebuilds
            # node-pty for ARM64).
            npm ci --ignore-scripts
            npm run --workspace=@nimbalyst/electron postinstall
          else
            npm ci
          fi

      - name: Build extension-sdk
        working-directory: packages/extension-sdk
        env:
          NODE_ENV: production
        run: npm run build

      - name: Build runtime package (for theme assets)
        working-directory: packages/runtime
        env:
          NODE_ENV: production
        run: npm run build

      - name: Build extensions
        env:
          NODE_ENV: production
        run: |
          # Build datamodellm extension
          cd packages/extensions/datamodellm
          npm run build
          cd ../../..
          # Build pdf-viewer extension
          cd packages/extensions/pdf-viewer
          npm run build
          cd ../../..
          # Build csv-spreadsheet extension
          cd packages/extensions/csv-spreadsheet
          npm run build

      # Install Bun for building Claude helper binary (all platforms)
      # Pin to specific version for deterministic builds
      # NOTE: Bun 1.2.4+ is required for macOS code signing support
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      # Build Claude helper binary for the current platform
      - name: Build Claude helper binary
        working-directory: packages/electron
        run: |
          if [ "${{ matrix.platform }}" == "mac" ]; then
            npm run build:claude-helper:mac
          elif [ "${{ matrix.platform }}" == "win" ]; then
            if [ "${{ matrix.arch }}" == "arm64" ]; then
              npm run build:claude-helper:windows-arm64
            else
              npm run build:claude-helper:windows
            fi
          else
            npm run build:claude-helper:linux
          fi
        shell: bash

      # macOS specific setup
      - name: Import macOS certificates
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(openssl rand -base64 32)}"
          
          # Decode certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Import certificate
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Clean up
          rm certificate.p12

      # Windows code signing setup (DigiCert KeyLocker)
      - name: Decode DigiCert Client Certificate (Windows)
        if: matrix.platform == 'win' && env.DIGICERT_CLIENT_CERT_BASE64 != ''
        env:
          DIGICERT_CLIENT_CERT_BASE64: ${{ secrets.DIGICERT_CLIENT_CERT_BASE64 }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:DIGICERT_CLIENT_CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "digicert_client_cert.p12"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Host "DigiCert client certificate decoded ($($certBytes.Length) bytes)"
        shell: powershell

      # Pre-populate electron-builder's winCodeSign cache for ARM64.
      # The published winCodeSign archive only ships windows-10/x64 and
      # windows-10/ia32 signtool binaries. On ARM64 runners electron-builder
      # looks for windows-10/arm64/signtool.exe and fails with ENOENT when it
      # tries to sign helper binaries (claude-helper.exe, node-pty tools, ...).
      # signtool.exe is architecture-agnostic for signing, so copying the x64
      # payload into an arm64 folder lets the build proceed.
      - name: Pre-populate winCodeSign for Windows ARM64
        if: matrix.platform == 'win' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "winCodeSign-2.6.0"
          $cacheRoot = Join-Path $env:LOCALAPPDATA "electron-builder\Cache\winCodeSign"
          $cacheDir = Join-Path $cacheRoot $version
          $archive = Join-Path $env:RUNNER_TEMP "$version.7z"

          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null

          Write-Host "Downloading $version.7z..."
          Invoke-WebRequest -Uri "https://github.com/electron-userland/electron-builder-binaries/releases/download/$version/$version.7z" -OutFile $archive

          Write-Host "Extracting to $cacheDir..."
          & 7z x $archive "-o$cacheDir" -y | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "7z extraction failed with exit code $LASTEXITCODE" }

          $x64Dir = Join-Path $cacheDir "windows-10\x64"
          $arm64Dir = Join-Path $cacheDir "windows-10\arm64"
          if (-not (Test-Path $x64Dir)) {
            throw "Expected x64 signtool directory not found at $x64Dir after extracting $version.7z"
          }
          New-Item -ItemType Directory -Force -Path $arm64Dir | Out-Null
          Copy-Item -Path (Join-Path $x64Dir "*") -Destination $arm64Dir -Recurse -Force

          Write-Host "Populated ARM64 signtool directory:"
          Get-ChildItem $arm64Dir | ForEach-Object { Write-Host "  $($_.Name)" }

      # Build Electron app
      - name: Build Electron app
        env:
          # Ensure production build (disables sourcemaps, enables optimizations)
          NODE_ENV: production
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: '3GYP4YJ3DH'
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # Windows signing is handled post-build by DigiCert KeyLocker
          # CRITICAL: GH_TOKEN is required for electron-builder to publish releases
          # The package.json "publish" config points to nimbalyst/nimbalyst-code (private repo)
          # This enables electron-builder to create releases in the PRIVATE repo for internal testing
          # Public releases are created separately via the publish-public.yml workflow
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Require notarization for release builds
          # Release builds require notarization (push to tag, or explicit release input)
          REQUIRE_NOTARIZE: ${{ github.ref_type == 'tag' || inputs.release == true || inputs.release == 'true' }}
          # Mark as official build for analytics tracking
          # This ensures PostHog only sends data from official GitHub release builds
          OFFICIAL_BUILD: 'true'
          # Architecture for this build job (used for macOS cross-compilation)
          BUILD_ARCH: ${{ matrix.arch }}
        working-directory: packages/electron
        run: |
          if [ "${{ matrix.platform }}" == "mac" ]; then
            if [ "${{ github.ref_type }}" == "tag" ] || [ "${{ inputs.release }}" == "true" ]; then
              npm run build:mac:notarized -- --${{ matrix.arch }} --mac dmg zip
            else
              npm run build:mac:local -- --${{ matrix.arch }} --mac dmg zip
            fi
          elif [ "${{ matrix.platform }}" == "win" ]; then
            if [ "${{ matrix.arch }}" == "arm64" ]; then
              npm run build:win:arm64
            else
              npm run build:win
            fi
          else
            npm run build:linux
          fi
        shell: bash

      # Sign Windows exe with DigiCert KeyLocker (post-build).
      # The artifactName template "${productName}-Windows-${arch}.${ext}" means
      # each matrix job produces a distinct arch-suffixed exe to sign.
      #
      # Skipped on Windows ARM64: digicert/code-signing-software-trust-action@v1.0.0
      # downloads an arch-specific `smctl` binary and DigiCert does not publish
      # `smctl-win32-arm64`, so the action fails with "Unable to locate executable
      # file: smctl". The electron-builder step already signs
      # Nimbalyst-Windows-arm64.exe with the configured p12 cert, so the ARM64
      # installer ships with a valid (non-EV) signature. Revisit to add
      # cloud-HSM EV signing for ARM64 once DigiCert ships an ARM64 smctl or via
      # x64 smctl under Windows ARM64 emulation.
      - name: Sign Windows exe with DigiCert KeyLocker
        if: matrix.platform == 'win' && matrix.arch != 'arm64' && env.DIGICERT_CLIENT_CERT_BASE64 != ''
        uses: digicert/code-signing-software-trust-action@v1.0.0
        with:
          simple-signing-mode: true
          input: "packages/electron/release/Nimbalyst-Windows-${{ matrix.arch }}.exe"
          keypair-alias: ${{ secrets.DIGICERT_KEYPAIR_ALIAS }}
        env:
          DIGICERT_CLIENT_CERT_BASE64: ${{ secrets.DIGICERT_CLIENT_CERT_BASE64 }}
          SM_HOST: "https://clientauth.one.digicert.com"
          SM_API_KEY: ${{ secrets.DIGICERT_CLIENT_API_TOKEN }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\digicert_client_cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_CERT_PW }}

      # Create a backwards-compatible copy of the signed x64 exe so any existing
      # download links pointing at Nimbalyst-Windows.exe keep working. ARM64
      # users are expected to pick the -arm64 file explicitly.
      - name: Create backwards-compatible x64 exe copy
        if: matrix.platform == 'win' && matrix.arch == 'x64'
        shell: bash
        run: |
          set -e
          src="packages/electron/release/Nimbalyst-Windows-x64.exe"
          dest="packages/electron/release/Nimbalyst-Windows.exe"
          if [ ! -f "$src" ]; then
            echo "Expected signed artifact not found: $src"
            ls -la packages/electron/release/
            exit 1
          fi
          cp "$src" "$dest"
          echo "Copied $src -> $dest for backwards-compatible download links"

      - name: Verify bundled Windows app-update.yml
        if: matrix.platform == 'win'
        working-directory: packages/electron
        run: |
          APP_UPDATE_YML=$(find release -path '*/resources/app-update.yml' | head -n 1)
          if [ -z "$APP_UPDATE_YML" ]; then
            echo "❌ Could not find bundled app-update.yml in release output"
            find release -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Inspecting $APP_UPDATE_YML"
          cat "$APP_UPDATE_YML"

          if ! grep -Fq 'publisherName:' "$APP_UPDATE_YML"; then
            echo "❌ app-update.yml is missing publisherName"
            exit 1
          fi

          if ! grep -Fq 'NIMBALYST, INC.' "$APP_UPDATE_YML"; then
            echo "❌ app-update.yml publisherName does not match expected Authenticode publisher"
            exit 1
          fi

          echo "✅ Bundled Windows app-update.yml contains the expected publisherName"
        shell: bash

      # Generate update metadata files
      - name: Generate update metadata
        if: github.ref_type == 'tag' || inputs.release == true || inputs.release == 'true'
        working-directory: packages/electron
        run: |
          node build/generate-update-yml.js || true
        shell: bash

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/electron/release/*.dmg
            packages/electron/release/*.zip
            packages/electron/release/*.exe
            packages/electron/release/*.AppImage
            packages/electron/release/*.yml
            packages/electron/release/*.yaml
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || inputs.release == true || inputs.release == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare release assets
        run: |
          mkdir -p release-files
          # Copy binaries but NOT yml files (we'll regenerate those)
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate update metadata with all architectures
        working-directory: packages/electron
        run: |
          # Copy binaries to release folder so generate-update-yml.js can find them
          mkdir -p release
          cp ../../release-files/*.dmg ../../release-files/*.zip release/ 2>/dev/null || true
          cp ../../release-files/*.exe release/ 2>/dev/null || true
          cp ../../release-files/*.AppImage release/ 2>/dev/null || true
          ls -la release/
          # Generate yml files with all architectures present
          node build/generate-update-yml.js
          # Copy generated yml files back to release-files
          cp release/*.yml ../../release-files/ 2>/dev/null || true
          cp release/*.yaml ../../release-files/ 2>/dev/null || true
          ls -la ../../release-files/

      - name: Generate release notes for R2 and public release
        id: release_notes
        run: |
          # Get recent commits for release notes
          git fetch --depth=50

          # Create technical release notes file for R2 (commit-based)
          {
            echo "## Recent Changes"
            echo ""
            git log --oneline -10 --pretty=format:"- %s" || echo "- Release build"
          } > release-files/RELEASE_NOTES.md

          # Extract public release notes from CHANGELOG.md
          # This gets the most recent release section (not [Unreleased])
          VERSION=${GITHUB_REF#refs/tags/v}

          # Get the release section from CHANGELOG
          awk -v version="$VERSION" '
            /^## \['"$VERSION"'\]/ { found=1; next }
            found && /^## \[/ { exit }
            found && /^### (Added|Changed|Fixed|Removed)/ {
              category=$0
              next
            }
            found && /^- / && category ~ /Added/ {
              sub(/^- /, "")
              if (!seen_added_header) {
                print "### New Features"
                print ""
                seen_added_header=1
              }
              print "- " $0
            }
            found && /^- / && category ~ /Changed/ {
              sub(/^- /, "")
              if (!seen_changed_header) {
                print ""
                print "### Improvements"
                print ""
                seen_changed_header=1
              }
              print "- " $0
            }
            found && /^- / && category ~ /Fixed/ {
              sub(/^- /, "")
              if (!seen_fixed_header) {
                print ""
                print "### Fixed"
                print ""
                seen_fixed_header=1
              }
              print "- " $0
            }
          ' CHANGELOG.md > release-files/PUBLIC_RELEASE_NOTES.md

          # If no public release notes were generated, fall back to basic message
          if [ ! -s release-files/PUBLIC_RELEASE_NOTES.md ]; then
            echo "New release with improvements and bug fixes." > release-files/PUBLIC_RELEASE_NOTES.md
          fi

          echo "Release notes generated"
          echo "=== Technical Release Notes (RELEASE_NOTES.md) ==="
          cat release-files/RELEASE_NOTES.md
          echo ""
          echo "=== Public Release Notes (PUBLIC_RELEASE_NOTES.md) ==="
          cat release-files/PUBLIC_RELEASE_NOTES.md

      # Upload to Cloudflare R2 (always happens for all releases)
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Install AWS CLI
          pip install awscli

          # Upload to R2 (overwrites previous release)
          aws s3 sync release-files/ s3://nimbalyst-alpha-updates-a7592ff2/ \
            --endpoint-url https://$CLOUDFLARE_ACCOUNT_ID.r2.cloudflarestorage.com \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.exe" \
            --include "*.AppImage" \
            --include "*.yml" \
            --include "*.yaml" \
            --include "RELEASE_NOTES.md" \
            --include "PUBLIC_RELEASE_NOTES.md"

          echo "✅ Uploaded to R2 alpha channel (with release notes)"

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            # Use the package.json version for non-tag builds
            PACKAGE_VERSION=$(node -p "require('./packages/electron/package.json').version")
            VERSION="${PACKAGE_VERSION}-dev.${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # GitHub Release is created for tag pushes (required for /release-public workflow)
      # or when explicitly requested via workflow_dispatch
      - name: Create GitHub Release
        if: github.ref_type == 'tag' || inputs.create_github_release == true || inputs.create_github_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release-files/*
          generate_release_notes: false
          body: |
            ## What's Changed
            See [commit history](https://github.com/nimbalyst/nimbalyst-code/commits/main) for details.

            ## Downloads
            - **macOS**: Download the .dmg file
            - **Windows**: Download the .exe file
            - **Linux**: Download the .AppImage file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: All releases are uploaded to R2 for alpha channel testing
      # GitHub Release creation is now MANUAL (set create_github_release=true)
      # This allows testing alpha builds before promoting to stable/public
      - name: Release Complete
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "✅ Release $VERSION complete!"
          echo ""
          echo "📦 Alpha channel updated (R2):"
          echo "   Bucket: nimbalyst-alpha-updates-a7592ff2"
          echo "   URL: https://pub-4357a3345db7463580090984c0e4e2ba.r2.dev/"
          echo ""
          echo "🧪 Testing instructions:"
          echo "   1. Open Nimbalyst Global Settings"
          echo "   2. Go to Advanced Settings"
          echo "   3. Command/Ctrl-click on 'Advanced Settings' title"
          echo "   4. Select 'Alpha (Internal Testing)' from dropdown"
          echo "   5. Save and restart the app"
          echo "   6. Check for updates (should find version $VERSION)"
          echo ""
          if [[ "${{ inputs.create_github_release }}" == "true" ]]; then
            echo "✅ GitHub Release created at:"
            echo "   https://github.com/nimbalyst/nimbalyst-code/releases/tag/$VERSION"
          else
            echo "ℹ️  GitHub Release NOT created (alpha testing only)"
            echo "   To promote to stable, re-run workflow with create_github_release=true"
          fi

      - name: Notify Slack - Release Published
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2.1.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nimbalyst ${{ steps.get_version.outputs.VERSION }} alpha build published*\nPlatforms: macOS (arm64, x64), Linux, Windows (x64)\nR2 alpha channel updated"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View build> | Triggered by ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack - Release Failed
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2.1.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nimbalyst ${{ steps.get_version.outputs.VERSION }} release FAILED*\nThe release job did not complete successfully."
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs> | Triggered by ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
