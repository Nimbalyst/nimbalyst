name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build rexical package
        working-directory: packages/rexical
        run: npm run build

      # macOS specific setup
      - name: Import macOS certificates
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(openssl rand -base64 32)}"
          
          # Decode certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Import certificate
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Clean up
          rm certificate.p12

      # Windows specific setup (optional - only if certificate is provided)
      - name: Import Windows certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          # Decode certificate
          [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -Path certificate.pfx -Encoding Byte
          
          # Import to certificate store
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PWD -Force -AsPlainText
          Import-PfxCertificate -FilePath certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          
          # Clean up
          Remove-Item certificate.pfx
        shell: powershell

      # Build Electron app
      - name: Build Electron app
        env:
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: '3GYP4YJ3DH'
          CSC_NAME: ${{ secrets.CSC_NAME }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # Windows signing
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
          # GitHub token for electron-builder publishing
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
          # Require notarization for release builds
          REQUIRE_NOTARIZE: ${{ github.event_name == 'push' || github.event.inputs.release == 'true' }}
        working-directory: packages/electron
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event.inputs.release }}" == "true" ]; then
              npm run build:mac:notarized
            else
              npm run build:mac:local
            fi
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            npm run build:win
          else
            npm run build:linux
          fi
        shell: bash
      
      # Generate update metadata files
      - name: Generate update metadata
        if: github.event_name == 'push' || github.event.inputs.release == 'true'
        working-directory: packages/electron
        run: |
          node build/generate-update-yml.js || true
        shell: bash

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/electron/release/*.dmg
            packages/electron/release/*.exe
            packages/electron/release/*.AppImage
            packages/electron/release/*.yml
            packages/electron/release/*.yaml
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.release == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.yml" -o -name "*.yaml" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            # Use the package.json version for non-tag builds
            PACKAGE_VERSION=$(node -p "require('./packages/electron/package.json').version")
            VERSION="${PACKAGE_VERSION}-dev.${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release-files/*
          generate_release_notes: false
          body: |
            ## What's Changed
            See [commit history](https://github.com/stravu/preditor/commits/main) for details.
            
            ## Downloads
            - **macOS**: Download the .dmg file
            - **Windows**: Download the .exe file  
            - **Linux**: Download the .AppImage file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to public repository
      - name: Publish to Public Repository
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          # Check if PAT is configured
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLIC_REPO_PAT secret not configured. Skipping public release."
            echo "To enable public releases, create a PAT with 'repo' scope and add it as PUBLIC_REPO_PAT secret."
            exit 0
          fi

          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # Check if release already exists in public repo
          if gh release view "$VERSION" --repo stravu/preditor-releases &>/dev/null; then
            echo "Release $VERSION already exists in public repository"
            exit 0
          fi

          # Extract release notes from git tag annotation
          NOTES=$(git tag -l --format='%(contents:body)' "$VERSION" || echo "")

          # If tag has no annotation or notes are empty, try RELEASE_NOTES.md
          if [ -z "$NOTES" ]; then
            RELEASE_NOTES_FILE="packages/electron/RELEASE_NOTES.md"
            if [ -f "$RELEASE_NOTES_FILE" ]; then
              # Extract notes for the current version
              VERSION_NO_V=${VERSION#v}
              NOTES=$(awk "/^## v?${VERSION_NO_V}[^0-9]/,/^## v?[0-9]/ {if (/^## v?[0-9]/ && !/^## v?${VERSION_NO_V}[^0-9]/) exit; print}" "$RELEASE_NOTES_FILE" | sed '1d' | sed '/^$/d')
            fi
          fi

          # Final fallback if still no notes
          if [ -z "$NOTES" ]; then
            NOTES="See [RELEASE_NOTES.md](https://github.com/stravu/preditor/blob/main/packages/electron/RELEASE_NOTES.md) for details."
          fi

          # Create release in public repository with update manifests
          gh release create "$VERSION" \
            --repo stravu/preditor-releases \
            --title "Preditor $VERSION" \
            --notes "${NOTES}

          ### Installation
          - **macOS**: Download and open the .dmg file, drag Preditor to Applications
          - **Windows**: Download and run the .exe installer
          - **Linux**: Download the .AppImage, make it executable, and run it

          The app will automatically check for updates." \
            release-files/*.dmg \
            release-files/*.exe \
            release-files/*.AppImage \
            release-files/*.yml \
            release-files/*.yaml 2>/dev/null || true