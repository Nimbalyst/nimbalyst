<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Menu Popover - Navigation Gutter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #2d2d2d;
      color: #ffffff;
      display: flex;
      min-height: 100vh;
      padding: 0;
    }

    /* Navigation Gutter - matches w-12 (48px) */
    .navigation-gutter {
      width: 48px;
      height: 100vh;
      background: #1a1a1a;
      border-right: 1px solid #4a4a4a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      flex-shrink: 0;
      position: relative;
    }

    .nav-button {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      background: transparent;
      color: #b3b3b3;
    }

    .nav-button.active {
      background: #60a5fa;
      color: #ffffff;
    }

    .nav-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 4px 6px;
    }

    .nav-spacer { flex: 1; }

    .nav-bottom {
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid #4a4a4a;
      width: 100%;
    }

    /* User avatar button */
    .user-avatar-button {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      background: #3a3a3a;
      position: relative;
    }

    .user-avatar-small {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #60a5fa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #ffffff;
    }

    .sync-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      border: 2px solid #1a1a1a;
    }

    /* Main content placeholder */
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #808080;
      font-size: 14px;
    }

    /* ============================
       USER MENU POPOVER
       ============================ */
    .user-menu-popover {
      position: absolute;
      bottom: 52px;
      left: 6px;
      width: 248px;
      background: #1a1a1a;
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      z-index: 1000;
      overflow: hidden;
    }

    /* Account identity header */
    .popover-identity {
      padding: 12px 14px;
      cursor: pointer;
    }

    .popover-identity:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .identity-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .identity-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      flex-shrink: 0;
      background: #60a5fa;
    }

    .identity-info {
      flex: 1;
      min-width: 0;
    }

    .identity-email {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .identity-status {
      font-size: 11px;
      color: #4ade80;
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .identity-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    .identity-chevron {
      flex-shrink: 0;
      color: #808080;
    }

    /* Divider */
    .popover-divider {
      height: 1px;
      background: #4a4a4a;
      margin: 0;
    }

    /* Navigation links */
    .popover-nav { padding: 6px; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: #b3b3b3;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
    }

    .nav-link-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-link-icon svg { width: 16px; height: 16px; }

    .nav-link-text {
      font-size: 13px;
      font-weight: 400;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Navigation Gutter -->
    <div class="navigation-gutter">
      <!-- Top mode buttons -->
      <div class="nav-section">
        <button class="nav-button active">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/></svg>
        </button>
      </div>
      <div class="nav-section">
        <button class="nav-button">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6z"/></svg>
        </button>
      </div>
      <div class="nav-section">
        <button class="nav-button">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        </button>
      </div>
      <div class="nav-section">
        <button class="nav-button">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/></svg>
        </button>
      </div>

      <div class="nav-spacer"></div>

      <!-- Bottom section -->
      <div class="nav-bottom">
        <div class="nav-section">
          <!-- Sync icon -->
          <button class="nav-button" style="color: #4ade80;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM10 17l-3.5-3.5 1.41-1.41L10 14.17l5.09-5.09 1.41 1.41L10 17z"/></svg>
          </button>

          <!-- Theme toggle -->
          <button class="nav-button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
          </button>

          <!-- Feedback -->
          <button class="nav-button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
          </button>

          <!-- User Avatar Button (replaces gear icon) -->
          <button class="user-avatar-button">
            <div class="user-avatar-small">G</div>
            <div class="sync-dot"></div>
          </button>

          <!-- USER MENU POPOVER (shown as open) -->
          <div class="user-menu-popover">
            <!-- Navigation Links (top) -->
            <div class="popover-nav">
              <div class="nav-link">
                <div class="nav-link-icon">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <span class="nav-link-text">User Settings</span>
              </div>
              <div class="nav-link">
                <div class="nav-link-icon">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                </div>
                <span class="nav-link-text">Project Settings</span>
              </div>
              <div class="nav-link">
                <div class="nav-link-icon">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                </div>
                <span class="nav-link-text">Team Settings</span>
              </div>
            </div>

            <div class="popover-divider"></div>

            <!-- Current project identity (bottom) -->
            <div class="popover-identity">
              <div class="identity-row">
                <div class="identity-avatar">G</div>
                <div class="identity-info">
                  <div class="identity-email">garrett@example.com</div>
                  <div class="identity-status">
                    <span class="identity-status-dot"></span>
                    Signed in
                  </div>
                </div>
                <span class="identity-chevron">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content area -->
    <div class="main-content">
      Editor content area
    </div>
  </div>
</body>
</html>
